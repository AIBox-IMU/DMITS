<!DOCTYPE html>
<html lang="ch">
<head>

<body>
<a href="#" class="up" title="回到顶部"></a>

</div>
<div class="header">

        </div>
    </div>
</div>
<div id="main" v-cloak>
    <div class="main_left">
        <div class="card" v-for="item in positions"  v-cloak>
            <div class="cardheader">
                <div style="display: flex;flex-direction: column;align-items: flex-start;flex:1 1 auto;" >
                    <h2>知识图谱</h2>
                    <span   :id="item.position+'end'">{{item.position}}</span>
                </div>
                <a class="cardafter">展开内容</a>
                <svg viewBox="0 0 32 32" class="gauge">
                    <title>该版块内所有信息的最高可信评分为 {{ item.score }}</title>
                    <path stroke="#28A745" :stroke-dasharray="item.score+', 100'" d="M16 1 a 15 15 0 0 1 0 30 a 15 15 0 0 1 0 -30"></path>
                    <text x="16" y="21">{{ item.score }}</text>
                </svg>
            </div>
            <div class="cardmain" style="display: none" >我是折叠隐藏内容</div>
        </div>
    </div>
    <div class="main_right" >
        <h4 class="fade-in">主要学习来源</h4>
        <div class="card"  v-for="item in positions">
            <div class="cardheader" :id="item.position+'start'">
                <div style="display: flex;flex-direction: column;align-items: flex-start;flex:1 1 auto;">
                    <span>{{item.position}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../static/JS/global/vue@3.2.19.js"></script>

</html>
